services:
  - type: web
    name: admin-gourbal
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node admin/server.js
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: ADMIN_PWD_HASH
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: gourbalissakh
      - key: GITHUB_REPO
        value: gourbal_portfolio
      - key: GITHUB_BRANCH
        value: main
