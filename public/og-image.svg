<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#04070f"/>
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7efff5" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#bf96ff" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7efff5"/>
      <stop offset="100%" stop-color="#bf96ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="20" fill="none" stroke="#7efff5" stroke-opacity="0.15" stroke-width="1.5"/>
  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="200" fill="#7efff5" fill-opacity="0.04"/>
  <circle cx="1100" cy="500" r="150" fill="#bf96ff" fill-opacity="0.05"/>
  <circle cx="80" cy="520" r="120" fill="#7efff5" fill-opacity="0.03"/>
  <!-- Accent bar -->
  <rect x="80" y="220" width="6" height="180" rx="3" fill="url(#accent)"/>
  <!-- Name -->
  <text x="110" y="290" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="72" fill="#e8eaf0" letter-spacing="-2">Mahamat Issakh</text>
  <text x="110" y="370" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="72" fill="#7efff5" letter-spacing="-2">GOURBAL</text>
  <!-- Title -->
  <text x="112" y="418" font-family="'Segoe UI',Arial,sans-serif" font-weight="400" font-size="28" fill="#6b7280" letter-spacing="1">Développeur Full Stack · Admin Réseau · Cybersécurité</text>
  <!-- Badge MG -->
  <rect x="1040" y="260" width="110" height="110" rx="20" fill="#04070f"/>
  <rect x="1040" y="260" width="110" height="110" rx="20" fill="url(#bg)" stroke="#7efff5" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1095" y="336" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="48" fill="#7efff5" text-anchor="middle">MG</text>
  <!-- Domain -->
  <text x="110" y="530" font-family="'Segoe UI',monospace" font-size="20" fill="#7efff5" fill-opacity="0.5" letter-spacing="2">gourbal.me</text>
</svg>
