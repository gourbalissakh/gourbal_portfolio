<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — M.GOURBAL</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
:root{
  --bg:#04070f;--bg2:#080d1a;--bg3:rgba(255,255,255,.04);
  --border:rgba(126,255,245,.12);--border-h:rgba(126,255,245,.35);
  --mint:#7efff5;--violet:#bf96ff;--coral:#ff6b6b;--gold:#ffd166;
  --text:#e8eaf0;--muted:#6b7280;
  --font:'Space Grotesk',system-ui,sans-serif;--mono:'Space Mono',monospace;
  --sidebar:230px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh}
#sidebar{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sb-logo{padding:1.5rem 1.4rem;border-bottom:1px solid var(--border)}
.sb-logo .name{font-weight:700;font-size:.95rem;letter-spacing:-.02em;color:var(--text)}
.sb-logo .name em{color:var(--mint);font-style:normal}
.sb-logo .badge{font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-top:.25rem}
nav.sb{flex:1;padding:.8rem 0;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.4rem;color:var(--muted);
  cursor:pointer;font-size:.875rem;font-weight:500;transition:all .18s;border-left:3px solid transparent;
  text-decoration:none}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sb-item.active{color:var(--mint);border-left-color:var(--mint);background:rgba(126,255,245,.05)}
.sb-item i{font-size:1rem;width:18px;text-align:center}
.sb-sep{height:1px;background:var(--border);margin:.6rem 1rem}
.sb-bottom{padding:1rem 1.4rem;border-top:1px solid var(--border)}
.sb-actions{display:flex;gap:.5rem}
.btn-build{flex:1;padding:.55rem;background:rgba(126,255,245,.1);border:1px solid rgba(126,255,245,.25);
  border-radius:8px;color:var(--mint);font-size:.75rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.btn-build:hover{background:rgba(126,255,245,.2)}
.btn-deploy{flex:1;padding:.55rem;background:rgba(191,150,255,.1);border:1px solid rgba(191,150,255,.25);
  border-radius:8px;color:var(--violet);font-size:.75rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.btn-deploy:hover{background:rgba(191,150,255,.2)}
#main{margin-left:var(--sidebar);flex:1;min-height:100vh}
.topbar{padding:1.3rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.topbar h1{font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;text-decoration:none}
.icon-btn:hover{border-color:var(--border-h);color:var(--text)}
.page{display:none;padding:2rem}
.page.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem}
.stat-n{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--mint),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-l{font-size:.8rem;color:var(--muted);margin-top:.2rem}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.4rem}
.sec-hd h2{font-size:1rem;font-weight:700}
.btn-add{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;
  background:var(--mint);color:var(--bg);border:none;border-radius:8px;
  font-weight:700;font-size:.8rem;cursor:pointer;transition:transform .15s;font-family:var(--font)}
.btn-add:hover{transform:translateY(-1px)}
.tbl-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th{padding:.75rem 1rem;text-align:left;font-size:.75rem;color:var(--muted);font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);font-family:var(--mono)}
td{padding:.8rem 1rem;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.cat-badge{padding:.18rem .6rem;border-radius:100px;font-size:.7rem;font-weight:600;font-family:var(--mono)}
.cat-web{background:rgba(126,255,245,.12);color:var(--mint)}
.cat-mobile{background:rgba(191,150,255,.12);color:var(--violet)}
.cat-security{background:rgba(255,107,107,.12);color:var(--coral)}
.cat-devops{background:rgba(100,200,255,.12);color:#64c8ff}
.cat-iot{background:rgba(255,209,102,.12);color:var(--gold)}
.td-actions{display:flex;gap:.45rem}
.btn-ed{padding:.3rem .65rem;border-radius:6px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .18s;font-family:var(--font)}
.btn-ed:hover{border-color:var(--mint);color:var(--mint)}
.btn-del{padding:.3rem .65rem;border-radius:6px;border:1px solid rgba(255,107,107,.25);
  background:transparent;color:var(--coral);font-size:.75rem;cursor:pointer;transition:all .18s;font-family:var(--font)}
.btn-del:hover{background:rgba(255,107,107,.1)}
.btn-rec{padding:.3rem .55rem;border-radius:6px;border:1px solid rgba(191,150,255,.3);
  background:transparent;color:var(--violet);font-size:.8rem;cursor:pointer;transition:all .18s;font-family:var(--font)}
.btn-rec:hover:not(:disabled){border-color:var(--violet);background:rgba(191,150,255,.12)}
.skills-admin{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.8rem}
.sk-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.9rem;
  display:flex;align-items:center;gap:.75rem;transition:border-color .2s}
.sk-card:hover{border-color:var(--border-h)}
.sk-card img{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.sk-info{flex:1;min-width:0}
.sk-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sk-cat{font-size:.7rem;color:var(--muted);font-family:var(--mono)}
.sk-act{display:flex;gap:.25rem;flex-shrink:0}
.ico-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;
  padding:.2rem;transition:color .18s;line-height:1}
.ico-btn:hover{color:var(--mint)}
.ico-btn.del:hover{color:var(--coral)}
/* ── galerie événements ── */
.ev-list{display:flex;flex-direction:column;gap:1.4rem}
.ev-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s}
.ev-card:hover{border-color:var(--border-h)}
.ev-head{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;cursor:pointer;user-select:none}
.ev-cover{width:64px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg2);border:1px solid var(--border)}
.ev-cover-ph{width:64px;height:48px;border-radius:8px;flex-shrink:0;background:var(--bg2);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center}
.ev-cover-ph i{font-size:1.4rem;color:var(--muted)}
.ev-meta{flex:1;min-width:0}
.ev-title{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-info{font-size:.75rem;color:var(--muted);margin-top:.2rem;font-family:var(--mono)}
.ev-toggle{color:var(--muted);font-size:.85rem;flex-shrink:0;transition:transform .25s}
.ev-toggle.open{transform:rotate(180deg)}
.ev-acts{display:flex;gap:.4rem;flex-shrink:0}
.ev-body{display:none;border-top:1px solid var(--border);padding:1.2rem}
.ev-body.open{display:block}
.ev-desc{font-size:.84rem;color:var(--muted);line-height:1.7;margin-bottom:1rem}
.ev-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.7rem;margin-bottom:1rem}
.ev-photo{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:4/3;border:1px solid var(--border)}
.ev-photo img{width:100%;height:100%;object-fit:cover;display:block}
.ev-photo-del{position:absolute;top:.3rem;right:.3rem;width:22px;height:22px;background:rgba(255,107,107,.85);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;opacity:0;transition:opacity .2s}
.ev-photo:hover .ev-photo-del{opacity:1}
.ev-add-photos{border:2px dashed rgba(126,255,245,.2);border-radius:10px;padding:1rem;
  text-align:center;cursor:pointer;transition:border-color .2s}
.ev-add-photos:hover,.ev-add-photos.drag{border-color:rgba(126,255,245,.5)}
.ev-add-photos span{font-size:.8rem;color:var(--muted)}
.ev-add-photos input{display:none}
.overlay{position:fixed;inset:0;background:rgba(4,7,15,.85);backdrop-filter:blur(8px);
  z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
.overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:2rem}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:1.5rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:.4rem}
.fg.full{grid-column:1/-1}
.fg label{font-size:.78rem;color:var(--muted);font-weight:500}
.fg input,.fg select,.fg textarea{padding:.65rem .9rem;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);
  font-size:.875rem;outline:none;transition:border-color .2s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(126,255,245,.45)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:80px}
.check-row{display:flex;align-items:center;gap:.5rem;margin-top:.4rem}
.check-row input[type=checkbox]{width:auto}
.check-row label{font-size:.85rem;cursor:pointer;color:var(--text)}
.form-row{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem}
.btn-cancel{padding:.6rem 1.3rem;background:transparent;border:1px solid var(--border);
  border-radius:9px;color:var(--muted);cursor:pointer;font-family:var(--font);font-size:.875rem;transition:all .2s}
.btn-cancel:hover{border-color:var(--border-h);color:var(--text)}
.btn-save{padding:.6rem 1.5rem;background:var(--mint);color:var(--bg);border:none;
  border-radius:9px;font-weight:700;font-size:.875rem;cursor:pointer;font-family:var(--font);transition:transform .15s}
.btn-save:hover{transform:translateY(-1px)}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;
  background:rgba(126,255,245,.12);border:1px solid rgba(126,255,245,.3);
  color:var(--mint);padding:.7rem 1.2rem;border-radius:10px;font-size:.85rem;
  transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.err{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.3);color:var(--coral)}
.console{background:#000;border:1px solid #1a2a1a;border-radius:10px;padding:1rem;
  font-family:var(--mono);font-size:.75rem;color:#7efff5;max-height:200px;overflow-y:auto;
  white-space:pre-wrap;margin-top:.8rem;display:none}
.console.show{display:block}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:1.4rem;margin-bottom:1.2rem}
.info-box p{font-size:.88rem;color:var(--muted);line-height:1.8}
.warn-box{background:var(--bg3);border:1px solid rgba(255,209,102,.2);border-radius:14px;padding:1.2rem}
.warn-lbl{font-size:.78rem;color:var(--gold);font-family:var(--mono);margin-bottom:.5rem;display:block}
.url-code{font-family:var(--mono);font-size:.8rem;color:var(--mint);
  background:rgba(126,255,245,.07);padding:.55rem .85rem;border-radius:8px;
  border:1px solid rgba(126,255,245,.15);margin-bottom:.8rem;display:block}
.settings-box{background:var(--bg3);border:1px solid var(--border);border-radius:14px;
  padding:1.5rem;max-width:440px;margin-bottom:1.2rem}
.settings-box h3{font-size:.9rem;font-weight:700;margin-bottom:1.2rem}

/* ── status cards ── */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem}
@media(max-width:600px){.status-grid{grid-template-columns:1fr}}
.status-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem}
.s-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.55rem}
.s-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.s-dot.online{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.7);animation:pg 2s ease-in-out infinite}
.s-dot.local{background:var(--gold)}
@keyframes pg{0%,100%{box-shadow:0 0 5px rgba(34,197,94,.6)}50%{box-shadow:0 0 14px rgba(34,197,94,1)}}
.s-lbl{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono)}
.s-lbl.online{color:#22c55e}
.s-lbl.local{color:var(--gold)}
.s-url{font-family:var(--mono);font-size:.76rem;color:var(--mint);word-break:break-all;margin-bottom:.5rem}
.s-url a{color:var(--mint);text-decoration:none}
.s-url a:hover{text-decoration:underline}
.s-desc{font-size:.8rem;color:var(--muted);line-height:1.6}

/* ── deploy card on dashboard ── */
.deploy-card{background:rgba(191,150,255,.06);border:1px solid rgba(191,150,255,.22);
  border-radius:14px;padding:1.4rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1.4rem;flex-wrap:wrap}
.deploy-card-text{flex:1;min-width:180px}
.deploy-card-text strong{display:block;font-size:.92rem;font-weight:700;margin-bottom:.3rem;color:var(--text)}
.deploy-card-text span{font-size:.82rem;color:var(--muted);line-height:1.6}
.btn-deploy-big{display:inline-flex;align-items:center;gap:.55rem;padding:.75rem 1.6rem;
  background:var(--violet);color:var(--bg);border:none;border-radius:10px;
  font-weight:700;font-size:.88rem;cursor:pointer;font-family:var(--font);
  transition:transform .15s,box-shadow .2s;box-shadow:0 0 24px rgba(191,150,255,.2);white-space:nowrap}
.btn-deploy-big:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(191,150,255,.4)}
.btn-deploy-big i{font-size:1rem}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sb-logo">
    <div class="name">M.GOURBAL<em>.</em></div>
    <div class="badge">PANEL ADMIN</div>
  </div>
  <nav class="sb" id="sb-nav"></nav>
  <div class="sb-bottom">
    <div class="sb-actions">
      <button class="btn-build" id="build-btn">Build</button>
      <button class="btn-deploy" id="deploy-btn">Deploy</button>
    </div>
    <div class="console" id="console-out"></div>
  </div>
</aside>

<main id="main">
  <div class="topbar">
    <h1 id="page-title">Dashboard</h1>
    <a href="http://localhost:4000" target="_blank" class="icon-btn" title="Voir le portfolio">
      <i class="bi bi-eye"></i>
    </a>
  </div>

  <div class="page active" id="page-dashboard">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-n" id="stat-proj">—</div><div class="stat-l">Projets</div></div>
      <div class="stat-box"><div class="stat-n" id="stat-feat">—</div><div class="stat-l">Featured</div></div>
      <div class="stat-box"><div class="stat-n" id="stat-sk">—</div><div class="stat-l">Compétences</div></div>
      <div class="stat-box"><div class="stat-n" id="stat-gal">—</div><div class="stat-l">Images galerie</div></div>
    </div>
    <!-- Status cards -->
    <div class="status-grid">
      <div class="status-card">
        <div class="s-head"><span class="s-dot local"></span><span class="s-lbl local">Admin — Local</span></div>
        <div class="s-url">http://localhost:4001/admin</div>
        <div class="s-desc" id="dash-local"></div>
      </div>
      <div class="status-card">
        <div class="s-head"><span class="s-dot online"></span><span class="s-lbl online">Portfolio — En ligne</span></div>
        <div class="s-url"><a href="https://gourbal.me" target="_blank" rel="noopener">gourbal.me</a></div>
        <div class="s-desc" id="dash-online"></div>
      </div>
    </div>

    <!-- Deploy card -->
    <div class="deploy-card">
      <div class="deploy-card-text">
        <strong id="deploy-card-title"></strong>
        <span id="deploy-card-desc"></span>
      </div>
      <button class="btn-deploy-big" id="deploy-btn-dashboard"><i class="bi bi-cloud-upload-fill"></i><span id="deploy-btn-lbl">Déployer</span></button>
    </div>

    <div class="info-box">
      <p id="dash-info"></p>
    </div>
  </div>

  <div class="page" id="page-projects">
    <div class="sec-hd">
      <h2>Projets <span id="proj-count" style="color:var(--muted);font-size:.85rem"></span></h2>
      <button class="btn-add" id="add-project-btn"><i class="bi bi-plus-lg"></i> Ajouter</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr id="proj-thead"></tr></thead>
        <tbody id="proj-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="page" id="page-skills">
    <div class="sec-hd">
      <h2>Compétences <span id="sk-count" style="color:var(--muted);font-size:.85rem"></span></h2>
      <button class="btn-add" id="add-skill-btn"><i class="bi bi-plus-lg"></i> Ajouter</button>
    </div>
    <div class="skills-admin" id="skills-grid"></div>
  </div>

  <div class="page" id="page-gallery">
    <div class="sec-hd">
      <h2>Galerie — Événements <span id="gal-count" style="color:var(--muted);font-size:.85rem"></span></h2>
      <button class="btn-add" id="add-event-btn"><i class="bi bi-plus-lg"></i> Nouvel événement</button>
    </div>
    <div class="ev-list" id="ev-list"></div>
  </div>

  <div class="page" id="page-settings">
    <div class="settings-box">
      <h3 id="pwd-box-title"></h3>
      <div class="fg" style="margin-bottom:.9rem">
        <label for="pwd-cur">Mot de passe actuel</label>
        <input type="password" id="pwd-cur" placeholder="••••••••">
      </div>
      <div class="fg" style="margin-bottom:.9rem">
        <label for="pwd-new">Nouveau mot de passe</label>
        <input type="password" id="pwd-new" placeholder="min. 6 caractères">
      </div>
      <button class="btn-save" style="width:100%" id="pwd-save-btn">Enregistrer</button>
    </div>
    <div class="settings-box">
      <h3 id="sys-box-title"></h3>
      <p id="sys-info" style="font-size:.83rem;color:var(--muted);line-height:1.9"></p>
    </div>
  </div>
</main>

<!-- Modal projet -->
<div class="overlay hidden" id="proj-modal">
  <div class="modal">
    <div class="modal-title" id="proj-modal-title">Nouveau projet</div>
    <div class="form-grid">
      <div class="fg"><label for="pf-id">ID (slug)</label><input id="pf-id" placeholder="mon-projet"></div>
      <div class="fg"><label for="pf-name">Nom</label><input id="pf-name" placeholder="Mon Projet"></div>
      <div class="fg full"><label for="pf-desc">Description</label><textarea id="pf-desc" rows="3"></textarea></div>
      <div class="fg">
        <label for="pf-cat">Catégorie</label>
        <select id="pf-cat">
          <option value="web">Web / Full Stack</option>
          <option value="mobile">Mobile</option>
          <option value="security">Cybersécurité</option>
          <option value="devops">DevOps</option>
          <option value="iot">IoT / IA</option>
        </select>
      </div>
      <div class="fg"><label for="pf-icon">Icône Bootstrap (bi-xxx)</label><input id="pf-icon" placeholder="bi-folder-fill"></div>
      <div class="fg full"><label for="pf-stack">Stack (séparés par virgule)</label><input id="pf-stack" placeholder="React, Laravel, MySQL"></div>
      <div class="fg"><label for="pf-gh">Lien GitHub</label><input id="pf-gh" placeholder="https://github.com/..."></div>
      <div class="fg"><label for="pf-live">Lien Live</label><input id="pf-live" placeholder="https://..."></div>
      <div class="fg"><label for="pf-domain">Domaine custom</label><input id="pf-domain" placeholder="app.gourbal.me"></div>

<div id="toast"></div>

<script>
// ── DOM helpers — zero innerHTML ──────────────────────────────────────────
function mk(tag, cls) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  return n;
}
function txt(tag, cls, text) {
  const n = mk(tag, cls);
  n.textContent = text;
  return n;
}
function ap(parent) {
  for (let i = 1; i < arguments.length; i++) parent.appendChild(arguments[i]);
  return parent;
}

// ── Sidebar nav ───────────────────────────────────────────────────────────
const NAV = [
  { id: 'dashboard', icon: 'bi-grid-1x2-fill', label: 'Dashboard' },
  { id: 'projects',  icon: 'bi-folder-fill',   label: 'Projets' },
  { id: 'skills',    icon: 'bi-lightning-fill', label: 'Compétences' },
  { id: 'gallery',   icon: 'bi-images',         label: 'Galerie' },
  { sep: true },
  { id: 'settings',  icon: 'bi-gear-fill',      label: 'Paramètres' },
  { id: '_logout',   icon: 'bi-box-arrow-right',label: 'Déconnexion' },
];
const sbNav = document.getElementById('sb-nav');
NAV.forEach(n => {
  if (n.sep) { sbNav.appendChild(mk('div', 'sb-sep')); return; }
  const el = mk('div', 'sb-item');
  ap(el, mk('i', 'bi ' + n.icon), txt('span', '', n.label));
  el.dataset.page = n.id;
  el.addEventListener('click', () => {
    if (n.id === '_logout') { location.href = '/admin/logout'; return; }
    goPage(n.id);
  });
  sbNav.appendChild(el);
});

const PAGE_TITLES = { dashboard:'Dashboard', projects:'Projets', skills:'Compétences', gallery:'Galerie', settings:'Paramètres' };
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(s => s.classList.remove('active'));
  const pg = document.getElementById('page-' + id);
  if (pg) pg.classList.add('active');
  const nav = document.querySelector('.sb-item[data-page="' + id + '"]');
  if (nav) nav.classList.add('active');
  document.getElementById('page-title').textContent = PAGE_TITLES[id] || id;
}

// ── Static text (no innerHTML) ────────────────────────────────────────────
(function initStaticText() {
  // Status cards
  document.getElementById('dash-local').textContent = 'Ce panel tourne uniquement sur ton PC. Il n\'est pas accessible en ligne. Toutes les modifications sont sauvegardées localement dans src/data/.';
  document.getElementById('dash-online').textContent = 'Le portfolio est visible par tout le monde sur internet. Pour mettre à jour le site en ligne avec tes dernières modifications, clique sur Déployer.';

  // Deploy card
  document.getElementById('deploy-card-title').textContent = 'Mettre à jour le site en ligne';
  ap(document.getElementById('deploy-card-desc'),
    txt('span','','Tu as modifié des projets, compétences ou la galerie ? Clique sur '),
    txt('strong','','Déployer'),
    txt('span','',' pour envoyer les changements sur '),
    txt('strong','','gourbal.me'),
    txt('span','','. Ça prend environ 15 secondes.')
  );

  // Dash info
  const di = document.getElementById('dash-info');
  ap(di,
    txt('span','','Workflow : modifie le contenu ici → clique '),
    txt('strong','','Déployer'),
    txt('span','',' → le site en ligne est mis à jour automatiquement.')
  );
  document.getElementById('pwd-box-title').textContent = 'Changer le mot de passe';
  document.getElementById('sys-box-title').textContent = 'Infos système';
  const si = document.getElementById('sys-info');
  [
    ['Données : ', 'src/data/'],
    ['Public  : ', 'public/'],
    ['Deploy  : ', 'Cloudflare Pages via Wrangler'],
  ].forEach(([lbl, val]) => {
    ap(si, txt('span','',lbl), txt('code','',val), document.createElement('br'));
  });
  ['Nom','Catégorie','Stack','Liens','Actions'].forEach(h => {
    document.getElementById('proj-thead').appendChild(txt('th','',h));
  });
  const bbd = document.getElementById('build-btn');
  bbd.textContent = ''; ap(bbd, mk('i','bi bi-hammer'), txt('span','',' Build'));
  const bdd = document.getElementById('deploy-btn');
  bdd.textContent = ''; ap(bdd, mk('i','bi bi-cloud-upload-fill'), txt('span','',' Deploy'));
})();

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (err ? ' err' : '');
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.className = ''; }, 3200);
}

// ── API helpers ───────────────────────────────────────────────────────────
async function api(method, url, body) {
  const opts = { method, headers: {} };
  if (body) { opts.body = JSON.stringify(body); opts.headers['Content-Type'] = 'application/json'; }
  const r = await fetch(url, opts);
  return r.json();
}

// ── Build / Deploy ────────────────────────────────────────────────────────
const cons = document.getElementById('console-out');
async function runAction(url, label) {
  cons.className = 'console show';
  cons.textContent = label + '...\n';
  const r = await api('POST', url);
  cons.textContent += (r.out || '') + (r.ok ? '\nTerminé.' : '\nErreur.');
  cons.scrollTop = cons.scrollHeight;
  toast(r.ok ? label + ' réussi !' : label + ' a échoué.', !r.ok);
  await loadAll();
}
document.getElementById('build-btn').addEventListener('click', () => runAction('/api/build', 'Build'));
document.getElementById('deploy-btn').addEventListener('click', () => runAction('/api/deploy', 'Deploy'));
document.getElementById('deploy-btn-dashboard').addEventListener('click', () => {
  const lbl = document.getElementById('deploy-btn-lbl');
  lbl.textContent = 'Déploiement…';
  document.getElementById('deploy-btn-dashboard').disabled = true;
  runAction('/api/deploy', 'Deploy').finally(() => {
    lbl.textContent = 'Déployer';
    document.getElementById('deploy-btn-dashboard').disabled = false;
  });
});

// ── Data ──────────────────────────────────────────────────────────────────
let PROJECTS = [], SKILLS = [], GALLERY = [];

async function loadAll() {
  const [pd, sd, gd] = await Promise.all([
    api('GET','/api/projects'), api('GET','/api/skills'), api('GET','/api/gallery')
  ]);
  PROJECTS = pd.projects || [];
  SKILLS   = sd.skills   || [];
  GALLERY  = gd.events  || [];
  renderDashboard(); renderProjects(); renderSkills(); renderGallery();
}

function renderDashboard() {
  document.getElementById('stat-proj').textContent = PROJECTS.length;
  document.getElementById('stat-feat').textContent = PROJECTS.filter(p => p.featured).length;
  document.getElementById('stat-sk').textContent   = SKILLS.length;
  const totalPhotos = GALLERY.reduce((s, e) => s + (e.photos || []).length, 0);
  document.getElementById('stat-gal').textContent  = totalPhotos;
}

// ── Projects ──────────────────────────────────────────────────────────────
const CAT_CLS = { web:'cat-web', mobile:'cat-mobile', security:'cat-security', devops:'cat-devops', iot:'cat-iot' };

function renderProjects() {
  document.getElementById('proj-count').textContent = '(' + PROJECTS.length + ')';
  const tbody = document.getElementById('proj-tbody');
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

  PROJECTS.forEach(p => {
    const tr = mk('tr');

    // Nom
    const tdN = mk('td');
    tdN.appendChild(txt('span','',p.name));
    if (p.featured) { const s = txt('span','', ' ★'); s.style.color = 'var(--gold)'; tdN.appendChild(s); }

    // Catégorie
    const tdC = mk('td');
    tdC.appendChild(txt('span', 'cat-badge ' + (CAT_CLS[p.category] || 'cat-web'), p.category));

    // Stack
    const tdS = mk('td');
    tdS.style.cssText = 'color:var(--muted);font-size:.78rem;font-family:var(--mono)';
    tdS.textContent = (p.stack || []).slice(0,3).join(', ');

    // Liens
    const tdL = mk('td');
    if (p.githubUrl) {
      const a = mk('a'); a.href = p.githubUrl; a.target = '_blank'; a.rel = 'noopener';
      a.textContent = 'GitHub'; a.style.cssText = 'color:var(--mint);font-size:.8rem;margin-right:.5rem';
      tdL.appendChild(a);
    }
    const liveUrl = p.customDomain ? 'https://' + p.customDomain : p.hostedUrl;
    if (liveUrl) {
      const a = mk('a'); a.href = liveUrl; a.target = '_blank'; a.rel = 'noopener';
      a.textContent = 'Live'; a.style.cssText = 'color:var(--violet);font-size:.8rem';
      tdL.appendChild(a);
    }

    // Actions
    const tdA = mk('td');
    const acts = mk('div', 'td-actions');
    const eb = txt('button', 'btn-ed', 'Modifier');
    eb.addEventListener('click', () => openProjModal(p));
    const db = txt('button', 'btn-del', 'Supprimer');
    db.addEventListener('click', () => deleteProject(p.id));
    const liveUrl2 = p.customDomain ? 'https://' + p.customDomain : p.hostedUrl;
    const rb = txt('button', 'btn-rec', '🎬');
    rb.title = 'Enregistrer une vidéo démo';
    if (!liveUrl2) { rb.disabled = true; rb.title = 'Ajoutez un lien Live d\'abord'; rb.style.opacity = '.35'; }
    rb.addEventListener('click', () => recordDemo(p.id, liveUrl2, p.name));
    ap(acts, eb, rb, db); tdA.appendChild(acts);

    ap(tr, tdN, tdC, tdS, tdL, tdA);
    tbody.appendChild(tr);
  });
}

function openProjModal(p) {
  document.getElementById('proj-modal-title').textContent = p ? 'Modifier le projet' : 'Nouveau projet';
  const fi = document.getElementById('pf-id');
  fi.value = p ? p.id : ''; fi.readOnly = !!p;
  document.getElementById('pf-name').value    = p ? p.name : '';
  document.getElementById('pf-desc').value    = p ? p.description : '';
  document.getElementById('pf-cat').value     = p ? p.category : 'web';
  document.getElementById('pf-icon').value    = p ? (p.icon || 'bi-folder-fill') : 'bi-folder-fill';
  document.getElementById('pf-stack').value   = p ? (p.stack || []).join(', ') : '';
  document.getElementById('pf-gh').value      = p ? (p.githubUrl || '') : '';
  document.getElementById('pf-live').value    = p ? (p.hostedUrl || '') : '';
  document.getElementById('pf-domain').value  = p ? (p.customDomain || '') : '';
  document.getElementById('pf-video').value   = p ? (p.videoUrl || '') : '';
  document.getElementById('pf-badge').value   = p ? (p.badgeColor || 'primary') : 'primary';
  document.getElementById('pf-img').value     = p ? (p.imageUrl || '') : '';
  document.getElementById('pf-featured').checked = p ? !!p.featured : false;
  document.getElementById('proj-modal').classList.remove('hidden');
}

document.getElementById('add-project-btn').addEventListener('click', () => openProjModal(null));
document.getElementById('proj-cancel').addEventListener('click', () => document.getElementById('proj-modal').classList.add('hidden'));
document.getElementById('proj-save').addEventListener('click', async () => {
  const obj = {
    id:           document.getElementById('pf-id').value.trim(),
    name:         document.getElementById('pf-name').value.trim(),
    description:  document.getElementById('pf-desc').value.trim(),
    category:     document.getElementById('pf-cat').value,
    icon:         document.getElementById('pf-icon').value.trim() || 'bi-folder-fill',
    stack:        document.getElementById('pf-stack').value.split(',').map(s => s.trim()).filter(Boolean),
    githubUrl:    document.getElementById('pf-gh').value.trim() || null,
    hostedUrl:    document.getElementById('pf-live').value.trim() || null,
    customDomain: document.getElementById('pf-domain').value.trim() || null,
    videoUrl:     document.getElementById('pf-video').value.trim() || null,
    badgeColor:   document.getElementById('pf-badge').value,
    imageUrl:     document.getElementById('pf-img').value.trim() || '',
    featured:     document.getElementById('pf-featured').checked,
  };
  const r = await api('POST', '/api/projects', obj);
  if (r.ok) {
    toast('Projet sauvegardé !');
    document.getElementById('proj-modal').classList.add('hidden');
    await loadAll();
  } else { toast(r.error || 'Erreur', true); }
});

async function deleteProject(id) {
  if (!confirm('Supprimer ce projet ?')) return;
  const r = await api('DELETE', '/api/projects/' + encodeURIComponent(id));
  if (r.ok) { toast('Projet supprimé.'); await loadAll(); }
  else toast(r.error || 'Erreur', true);
}

async function recordDemo(projectId, projectUrl, projectName) {
  if (!projectUrl) { toast('Ajoutez un lien Live au projet d\'abord.', true); return; }
  if (!confirm('Lancer l\'enregistrement vidéo de "' + projectName + '" ?\n\nChrome va visiter l\'URL et enregistrer ~30s de vidéo via GitHub Actions (~2 min).')) return;
  toast('Enregistrement lancé… ⏳');
  const r = await api('POST', '/api/record-demo', { projectId, projectUrl, projectName });
  if (!r.ok) { toast(r.error || 'Erreur lors du lancement', true); return; }
  toast('⏳ Vidéo en cours d\'enregistrement…');
  pollRecordStatus(projectId, projectName);
}

function pollRecordStatus(projectId, projectName) {
  let attempts = 0;
  const MAX = 24; // 24 × 15s = 6 min max
  const iv = setInterval(async () => {
    attempts++;
    if (attempts > MAX) {
      clearInterval(iv);
      toast('⚠️ Délai dépassé — vérifie GitHub Actions.', true);
      return;
    }
    try {
      const s = await api('GET', '/api/record-status?projectId=' + encodeURIComponent(projectId));
      if (s.status === 'completed') {
        clearInterval(iv);
        if (s.conclusion === 'success') {
          toast('🎬 Vidéo de "' + projectName + '" prête ! Portfolio mis à jour.');
        } else {
          toast('❌ Enregistrement échoué (' + (s.conclusion || '?') + '). Voir GitHub Actions.', true);
        }
      }
    } catch (_) { /* on continue */ }
  }, 15000);
}

// ── Skills ────────────────────────────────────────────────────────────────
function renderSkills() {
  document.getElementById('sk-count').textContent = '(' + SKILLS.length + ')';
  const grid = document.getElementById('skills-grid');
  while (grid.firstChild) grid.removeChild(grid.firstChild);

  SKILLS.forEach(s => {
    const card = mk('div', 'sk-card');
    const img  = mk('img'); img.src = s.icon; img.alt = s.name; img.loading = 'lazy';
    const info = mk('div', 'sk-info');
    ap(info, txt('div','sk-name', s.name), txt('div','sk-cat', s.category + ' · ' + s.level));
    const acts = mk('div', 'sk-act');
    const eb = mk('button', 'ico-btn'); eb.title = 'Modifier';
    eb.appendChild(mk('i','bi bi-pencil'));
    eb.addEventListener('click', () => openSkillModal(s));
    const db = mk('button', 'ico-btn del'); db.title = 'Supprimer';
    db.appendChild(mk('i','bi bi-x-lg'));
    db.addEventListener('click', () => deleteSkill(s.id));
    ap(acts, eb, db);
    ap(card, img, info, acts);
    grid.appendChild(card);
  });
}

function openSkillModal(s) {
  document.getElementById('sk-modal-title').textContent = s ? 'Modifier' : 'Nouvelle compétence';
  const fi = document.getElementById('skf-id');
  fi.value = s ? s.id : ''; fi.readOnly = !!s;
  document.getElementById('skf-name').value  = s ? s.name : '';
  document.getElementById('skf-cat').value   = s ? s.category : 'langages';
  document.getElementById('skf-level').value = s ? s.level : 'Interméd.';
  document.getElementById('skf-icon').value  = s ? s.icon : '';
  document.getElementById('skill-modal').classList.remove('hidden');
}

document.getElementById('add-skill-btn').addEventListener('click', () => openSkillModal(null));
document.getElementById('skill-cancel').addEventListener('click', () => document.getElementById('skill-modal').classList.add('hidden'));
document.getElementById('skill-save').addEventListener('click', async () => {
  const obj = {
    id:       document.getElementById('skf-id').value.trim(),
    name:     document.getElementById('skf-name').value.trim(),
    category: document.getElementById('skf-cat').value,
    level:    document.getElementById('skf-level').value,
    icon:     document.getElementById('skf-icon').value.trim(),
  };
  const r = await api('POST', '/api/skills', obj);
  if (r.ok) { toast('Compétence sauvegardée !'); document.getElementById('skill-modal').classList.add('hidden'); await loadAll(); }
  else toast(r.error || 'Erreur', true);
});

async function deleteSkill(id) {
  if (!confirm('Supprimer cette compétence ?')) return;
  const r = await api('DELETE', '/api/skills/' + encodeURIComponent(id));
  if (r.ok) { toast('Supprimée.'); await loadAll(); }
  else toast(r.error || 'Erreur', true);
}

// ── Gallery — Événements ──────────────────────────────────────────────────
let EVENTS = [];

function renderGallery() {
  EVENTS = GALLERY; // GALLERY est rempli dans loadAll via /api/gallery (events)
  const total = EVENTS.reduce((s, e) => s + (e.photos || []).length, 0);
  document.getElementById('gal-count').textContent = '(' + EVENTS.length + ' événement' + (EVENTS.length > 1 ? 's' : '') + ', ' + total + ' photo' + (total > 1 ? 's' : '') + ')';
  const list = document.getElementById('ev-list');
  while (list.firstChild) list.removeChild(list.firstChild);

  if (!EVENTS.length) {
    const empty = mk('div');
    empty.style.cssText = 'text-align:center;padding:3rem;color:var(--muted);font-size:.9rem';
    ap(empty, mk('i','bi bi-images'), document.createTextNode(' Aucun événement — créez-en un !'));
    list.appendChild(empty);
    return;
  }

  EVENTS.forEach(ev => {
    const card = mk('div', 'ev-card');

    // ── tête cliquable (toggle photos)
    const head = mk('div', 'ev-head');

    // couverture = 1ère photo
    const firstPhoto = (ev.photos || [])[0];
    if (firstPhoto) {
      const img = mk('img', 'ev-cover');
      img.src = '/' + firstPhoto.src; img.alt = ev.title || '';
      head.appendChild(img);
    } else {
      const ph = mk('div', 'ev-cover-ph');
      ph.appendChild(mk('i','bi bi-image'));
      head.appendChild(ph);
    }

    const meta = mk('div', 'ev-meta');
    ap(meta,
      txt('div', 'ev-title', ev.title || 'Sans titre'),
      txt('div', 'ev-info', (ev.date ? ev.date + ' · ' : '') + (ev.photos || []).length + ' photo' + ((ev.photos||[]).length > 1 ? 's' : ''))
    );
    head.appendChild(meta);

    // boutons modifier / supprimer
    const acts = mk('div', 'ev-acts');
    const editBtn = mk('button', 'ico-btn'); editBtn.title = 'Modifier';
    editBtn.appendChild(mk('i','bi bi-pencil'));
    editBtn.addEventListener('click', e => { e.stopPropagation(); openEventModal(ev); });
    const delBtn = mk('button', 'ico-btn del'); delBtn.title = 'Supprimer';
    delBtn.appendChild(mk('i','bi bi-trash'));
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteEvent(ev.id); });
    ap(acts, editBtn, delBtn);
    head.appendChild(acts);

    const chevron = mk('i', 'bi bi-chevron-down ev-toggle');
    head.appendChild(chevron);

    // ── corps (photos + upload)
    const body = mk('div', 'ev-body');
    if (ev.description) body.appendChild(txt('p', 'ev-desc', ev.description));

    // grille de photos
    const photosGrid = mk('div', 'ev-photos');
    (ev.photos || []).forEach(ph => {
      const wrap = mk('div', 'ev-photo');
      const img  = mk('img'); img.src = '/' + ph.src; img.alt = ph.caption || ''; img.loading = 'lazy';
      const del  = mk('button', 'ev-photo-del'); del.title = 'Supprimer';
      del.appendChild(mk('i','bi bi-x'));
      del.addEventListener('click', () => deletePhoto(ev.id, ph.id));
      ap(wrap, img, del);
      photosGrid.appendChild(wrap);
    });
    body.appendChild(photosGrid);

    // zone upload photos
    const uz  = mk('div', 'ev-add-photos');
    const uzi = mk('i', 'bi bi-plus-circle');
    const uzs = txt('span', '', ' Ajouter des photos');
    const ufi = mk('input'); ufi.type = 'file'; ufi.accept = 'image/*'; ufi.multiple = true;
    ap(uz, uzi, uzs, ufi);
    uz.addEventListener('click', () => ufi.click());
    uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('drag'); });
    uz.addEventListener('dragleave', () => uz.classList.remove('drag'));
    uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('drag'); uploadPhotos(ev.id, e.dataTransfer.files); });
    ufi.addEventListener('change', () => { uploadPhotos(ev.id, ufi.files); ufi.value = ''; });
    body.appendChild(uz);

    // toggle
    head.addEventListener('click', e => {
      if (e.target.closest('.ev-acts')) return;
      body.classList.toggle('open');
      chevron.classList.toggle('open');
    });

    ap(card, head, body);
    list.appendChild(card);
  });
}

async function uploadPhotos(evId, files) {
  if (!files.length) return;
  toast('Upload en cours…');
  const fd = new FormData();
  Array.from(files).forEach(f => fd.append('file', f));
  const r = await fetch('/api/events/' + encodeURIComponent(evId) + '/photos', { method:'POST', body:fd });
  const d = await r.json();
  if (d.ok) toast(d.added.length + ' photo' + (d.added.length > 1 ? 's' : '') + ' ajoutée' + (d.added.length > 1 ? 's' : '') + ' !');
  else toast(d.error || 'Erreur upload', true);
  await loadAll();
}

async function deletePhoto(evId, photoId) {
  if (!confirm('Supprimer cette photo ?')) return;
  const r = await api('DELETE', '/api/events/' + encodeURIComponent(evId) + '/photos/' + encodeURIComponent(photoId));
  if (r.ok) { toast('Photo supprimée.'); await loadAll(); }
  else toast(r.error || 'Erreur', true);
}

async function deleteEvent(id) {
  if (!confirm('Supprimer cet événement et toutes ses photos ?')) return;
  const r = await api('DELETE', '/api/events/' + encodeURIComponent(id));
  if (r.ok) { toast('Événement supprimé.'); await loadAll(); }
  else toast(r.error || 'Erreur', true);
}

// ── Modal événement ───────────────────────────────────────────────────────
function openEventModal(ev) {
  document.getElementById('ev-modal-title').textContent = ev ? 'Modifier l\'événement' : 'Nouvel événement';
  const fi = document.getElementById('evf-id');
  fi.value = ev ? ev.id : ''; fi.readOnly = !!ev;
  document.getElementById('evf-title').value = ev ? ev.title : '';
  document.getElementById('evf-date').value  = ev ? (ev.date || '') : '';
  document.getElementById('evf-desc').value  = ev ? (ev.description || '') : '';
  document.getElementById('event-modal').classList.remove('hidden');
}

document.getElementById('add-event-btn').addEventListener('click', () => openEventModal(null));
document.getElementById('ev-cancel').addEventListener('click', () => document.getElementById('event-modal').classList.add('hidden'));
document.getElementById('ev-save').addEventListener('click', async () => {
  const obj = {
    id:          document.getElementById('evf-id').value.trim(),
    title:       document.getElementById('evf-title').value.trim(),
    date:        document.getElementById('evf-date').value.trim(),
    description: document.getElementById('evf-desc').value.trim(),
  };
  if (!obj.id) { toast('ID obligatoire', true); return; }
  if (!obj.title) { toast('Titre obligatoire', true); return; }
  const r = await api('POST', '/api/events', obj);
  if (r.ok) {
    toast('Événement sauvegardé !');
    document.getElementById('event-modal').classList.add('hidden');
    await loadAll();
  } else { toast(r.error || 'Erreur', true); }
});

// ── Settings ──────────────────────────────────────────────────────────────
document.getElementById('pwd-save-btn').addEventListener('click', async () => {
  const r = await api('POST', '/api/password', {
    current: document.getElementById('pwd-cur').value,
    next:    document.getElementById('pwd-new').value,
  });
  if (r.ok) {
    toast('Mot de passe changé !');
    document.getElementById('pwd-cur').value = '';
    document.getElementById('pwd-new').value = '';
  } else { toast(r.error || 'Erreur', true); }
});

// ── Close modals on backdrop click ────────────────────────────────────────
['proj-modal','skill-modal','event-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) document.getElementById(id).classList.add('hidden');
  });
});

// ── Mode online/local ─────────────────────────────────────────────────────
async function detectMode() {
  try {
    const m = await api('GET', '/api/mode');
    if (m.online) {
      // Admin est en ligne sur Render
      const adminCard = document.querySelector('.status-card:first-child');
      const dot  = adminCard.querySelector('.s-dot');
      const lbl  = adminCard.querySelector('.s-lbl');
      const url  = adminCard.querySelector('.s-url');
      const desc = document.getElementById('dash-local');
      dot.className  = 's-dot online';
      lbl.className  = 's-lbl online';
      lbl.textContent = 'Admin — En ligne';
      url.textContent = '';
      const a = document.createElement('a');
      a.href = 'https://admin-gourbal.onrender.com/admin';
      a.target = '_blank'; a.rel = 'noopener';
      a.textContent = 'admin-gourbal.onrender.com';
      url.appendChild(a);
      desc.textContent = 'Ce panel est accessible depuis n\'importe où sur internet. Les modifications sont enregistrées directement sur GitHub et déployées automatiquement.';

      // Deploy card : automatique en ligne
      document.getElementById('deploy-card-title').textContent = 'Déploiement automatique actif';
      const dc = document.getElementById('deploy-card-desc');
      dc.textContent = '';
      const s1 = document.createElement('span'); s1.textContent = 'Chaque modification que tu sauvegardes est envoyée sur ';
      const b1 = document.createElement('strong'); b1.textContent = 'GitHub';
      const s2 = document.createElement('span'); s2.textContent = ', puis ';
      const b2 = document.createElement('strong'); b2.textContent = 'Cloudflare Pages';
      const s3 = document.createElement('span'); s3.textContent = ' met à jour ';
      const b3 = document.createElement('strong'); b3.textContent = 'gourbal.me';
      const s4 = document.createElement('span'); s4.textContent = ' automatiquement en ~30s. Aucun bouton à cliquer.';
      dc.appendChild(s1); dc.appendChild(b1); dc.appendChild(s2); dc.appendChild(b2);
      dc.appendChild(s3); dc.appendChild(b3); dc.appendChild(s4);

      // Bouton deploy inutile en ligne
      const deployBtn = document.getElementById('deploy-btn-dashboard');
      deployBtn.disabled = true;
      deployBtn.style.opacity = '0.4';
      deployBtn.style.cursor = 'not-allowed';
      document.getElementById('deploy-btn-lbl').textContent = 'Auto';

      // Lien preview vers gourbal.me
      const previewBtn = document.querySelector('.topbar .icon-btn');
      if (previewBtn) previewBtn.href = 'https://gourbal.me';

      // Settings : expliquer que le mdp est dans Render
      const si = document.getElementById('sys-info');
      while (si.firstChild) si.removeChild(si.firstChild);
      [
        ['Mode     : ', 'En ligne (GitHub API)'],
        ['Repo     : ', m.owner + '/' + m.repo],
        ['Branche  : ', m.branch],
        ['Deploy   : ', 'GitHub Actions → Cloudflare Pages'],
        ['Mot de passe : ', 'Variable ADMIN_PWD_HASH dans Render.com'],
      ].forEach(([lbl2, val]) => {
        const sp1 = document.createElement('span'); sp1.textContent = lbl2;
        const co  = document.createElement('code'); co.textContent = val;
        si.appendChild(sp1); si.appendChild(co); si.appendChild(document.createElement('br'));
      });
    }
  } catch (e) {
    // mode local, rien à changer
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
detectMode();
loadAll();
</script>
